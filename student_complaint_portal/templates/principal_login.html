<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principal Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h3 style="margin: 0; color: #555; font-size: 1.2rem; font-weight: normal; margin-bottom: 5px;">N.K. Orchid College of Engineering, Solapur</h3>
        <h1>Principal Portal</h1>
    </header>

    <div class="container" style="max-width: 500px;">
        {% if error %}
        <div class="success-message" style="background-color: #f8d7da; color: #721c24;">
            {{ error }}
        </div>
        {% endif %}

        <h2 style="text-align: center; color: var(--pink-dark); margin-top: 0;">Login</h2>
        
        <form action="{{ url_for('principal_login') }}" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div style="text-align: center;">
                <button type="submit" class="btn">Login</button>
            </div>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="{{ url_for('index') }}" class="back-link">&larr; Back to Home</a>
        </div>
    </div>
</body>
</html>
